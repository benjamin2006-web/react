<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Class</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:linear-gradient(135deg,#e3f2fd,#fce4ec);
min-height:100vh;
display:flex;
overflow-x:hidden;
}

/* TOGGLE BUTTON */
.toggle-btn{
position:fixed;
top:15px;
left:15px;
background:#1976d2;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-size:18px;
z-index:1200;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:#0d1b2a;
color:white;
transition:0.4s;
padding-top:60px;
z-index:1100;
}

.sidebar.active{left:0;}

.sidebar h2{
text-align:center;
margin-bottom:20px;
color:#90caf9;
}

.sidebar ul{list-style:none;}

.sidebar ul li{
padding:15px 25px;
cursor:pointer;
transition:0.3s;
}

.sidebar ul li:hover{
background:#1b263b;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:1000;
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* MAIN */
.main{
flex:1;
padding:80px 20px;
text-align:center;
width:100%;
}

h1{
font-size:38px;
margin-bottom:10px;
color:#0d1b2a;
}

.welcome{
font-size:20px;
margin-bottom:30px;
height:30px;
font-weight:bold;
color:#444;
}

/* CARDS */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:40px;
border-radius:18px;
font-size:22px;
font-weight:bold;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.4s;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.p6{background:linear-gradient(135deg,#ff9a9e,#fad0c4);}
.s3{background:linear-gradient(135deg,#a18cd1,#fbc2eb);}
.s6{background:linear-gradient(135deg,#fbc2eb,#a6c1ee);}
.tvet{background:linear-gradient(135deg,#84fab0,#8fd3f4);}

/* MODALS */
.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.7);
background:white;
width:350px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:2000;
}

.modal.active{
opacity:1;
visibility:visible;
transform:translate(-50%,-50%) scale(1);
}

.modal h3{
margin-bottom:15px;
}

.modal input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

.modal button{
width:100%;
padding:10px;
background:#1976d2;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.close{
position:absolute;
right:15px;
top:10px;
cursor:pointer;
font-size:18px;
}

footer{
margin-top:50px;
color:#666;
font-size:14px;
}
</style>
</head>

<body>
     <button class="toggle-btn" id="toggleBtn">☰</button>


<div class="sidebar" id="sidebar">
<h2><i class="fas fa-graduation-cap"></i> Amashuri</h2>
<ul>
<li onclick="openModal('loginModal')"><i class="fas fa-sign-in-alt"></i> Login</li>
<li onclick="openModal('signupModal')"><i class="fas fa-user-plus"></i> Signup</li>
<li onclick="openModal('paymentModal')"><i class="fas fa-credit-card"></i> Payment</li>
<li onclick="openModal('contactModal')"><i class="fas fa-phone"></i> Contact</li>
<li onclick="showHelp()"><i class="fas fa-question-circle"></i> Help</li>
</ul>
</div>

<div class="overlay" id="overlay"></div>

<div class="main">
<h1>Choose Your Level</h1>
<div class="welcome" id="welcome"></div>

<div class="container">
<div class="card p6" onclick="openLevel('P6')">P6</div>
<div class="card s3" onclick="openLevel('S3')">S3</div>
<div class="card s6" onclick="openLevel('S6')">S6</div>
<div class="card tvet" onclick="openLevel('TVET')">TVET</div>
</div>

<div id="levelContent" style="margin-top:30px;"></div>

<footer>
© 2026 Amashuri Smart Learning Platform
</footer>
</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
<span class="close" onclick="closeModal('loginModal')">&times;</span>
<h3>Login</h3>
<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- SIGNUP MODAL -->
<div class="modal" id="signupModal">
<span class="close" onclick="closeModal('signupModal')">&times;</span>
<h3>Signup</h3>
<input type="text" id="signupUser" placeholder="Username">
<input type="password" id="signupPass" placeholder="Password">
<button onclick="signup()">Create Account</button>
</div>

<!-- PAYMENT MODAL -->
<div class="modal" id="paymentModal">
<span class="close" onclick="closeModal('paymentModal')">&times;</span>
<h3>Payment</h3>
<input type="text" placeholder="Card Number">
<input type="text" placeholder="Expiry Date">
<input type="text" placeholder="CVV">
<button>Pay Now</button>
</div>

<!-- CONTACT MODAL -->
<div class="modal" id="contactModal">
<span class="close" onclick="closeModal('contactModal')">&times;</span>
<h3>Contact Us</h3>
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Email">
<input type="text" placeholder="Message">
<button>Send</button>
</div>

<script>
const toggleBtn=document.getElementById("toggleBtn");
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

toggleBtn.onclick=()=>{
sidebar.classList.toggle("active");
overlay.classList.toggle("active");
};

overlay.onclick=()=>{
sidebar.classList.remove("active");
overlay.classList.remove("active");
};

function openModal(id){
document.getElementById(id).classList.add("active");
overlay.classList.add("active");
}

function closeModal(id){
document.getElementById(id).classList.remove("active");
overlay.classList.remove("active");
}

function signup(){
let user=document.getElementById("signupUser").value;
let pass=document.getElementById("signupPass").value;
localStorage.setItem("user",user);
localStorage.setItem("pass",pass);
alert("Account Created!");
closeModal("signupModal");
}

function login(){
let user=document.getElementById("loginUser").value;
let pass=document.getElementById("loginPass").value;
if(user===localStorage.getItem("user") && pass===localStorage.getItem("pass")){
alert("Login Successful!");
closeModal("loginModal");
}else{
alert("Invalid Credentials");
}
}

function openLevel(level){
document.getElementById("levelContent").innerHTML=
`<h2>${level} Subjects</h2>
<p>Mathematics | English | Science | ICT</p>`;
}

function showHelp(){
alert("Select your level and start learning. Login required for full access.");
}

/* Typing Effect */
const text="WELCOME TO AMASHURI SMART LEARNING PLATFORM";
let index=0;
function type(){
document.getElementById("welcome").innerHTML=text.slice(0,index++);
if(index<=text.length){setTimeout(type,70);}
}
type();
</script>

</body>
</html>
